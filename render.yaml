services:
  - type: web
    name: sauti-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    autoDeploy: true
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        value: https://sauti-digital-uganda.vercel.app
      - key: NODE_VERSION
        value: "20"
