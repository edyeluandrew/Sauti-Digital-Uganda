services:
  - type: web
    name: sauti-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        value: https://sauti-digital-uganda.vercel.app
      - key: NODE_VERSION
        value: "20"
